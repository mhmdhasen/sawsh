name: Build Android APK (Kotlin)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Fix and Grant execute permission for gradlew
        run: |
          # Fix corrupted wrapper jar if necessary
          mkdir -p gradle/wrapper
          curl -L https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd android && ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
