name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Validate and Regenerate Gradle Wrapper if needed
        run: |
          echo "Checking gradle-wrapper.jar..."
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "⚠️ Gradle wrapper missing or corrupted, regenerating..."
            rm -rf gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
            ./gradlew wrapper --gradle-version=8.5 --distribution-type=bin
          else
            echo "✓ Gradle wrapper exists and is valid"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Verify Gradle Wrapper
        run: |
          echo "Repository structure:"
          ls -la
          echo ""
          echo "Gradle wrapper structure:"
          ls -la gradle/wrapper/
          echo ""
          echo "Gradle wrapper JAR file info:"
          file gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/*.apk
