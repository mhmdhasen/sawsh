name: Build Android APK (Kotlin)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Fix and Grant execute permission for gradlew
        run: |
          # Fix corrupted wrapper jar if necessary
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar with retry logic
          MAX_ATTEMPTS=3
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT: Downloading gradle-wrapper.jar..."
            
            # Use the gradle wrapper distribution URL instead
            if curl -L -f -S --max-time 30 \
              https://services.gradle.org/distributions/gradle-8.5-wrapper.jar \
              -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null; then
              
              # Verify the file is not empty and is a valid JAR
              if [ -s gradle/wrapper/gradle-wrapper.jar ] && file gradle/wrapper/gradle-wrapper.jar | grep -q "Java"; then
                echo "JAR file downloaded successfully"
                break
              fi
            fi
            
            echo "Attempt $ATTEMPT: Failed to download valid JAR file, retrying..."
            rm -f gradle/wrapper/gradle-wrapper.jar
            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done
          
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Failed to download gradle-wrapper.jar after $MAX_ATTEMPTS attempts"
            exit 1
          fi
          
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd android && ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
