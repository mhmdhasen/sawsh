name: Build Android APK (Kotlin)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Fix and Grant execute permission for gradlew
        run: |
          # Fix corrupted wrapper jar if necessary
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar with retry logic
          MAX_ATTEMPTS=3
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            curl -L -f https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar \
              -o gradle/wrapper/gradle-wrapper.jar
            
            # Verify the file is not empty and is a valid JAR
            if [ -s gradle/wrapper/gradle-wrapper.jar ] && file gradle/wrapper/gradle-wrapper.jar | grep -q "Java"; then
              echo "JAR file downloaded successfully"
              break
            else
              echo "Attempt $ATTEMPT: Failed to download valid JAR file, retrying..."
              rm -f gradle/wrapper/gradle-wrapper.jar
              ATTEMPT=$((ATTEMPT + 1))
              sleep 2
            fi
          done
          
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Failed to download gradle-wrapper.jar after $MAX_ATTEMPTS attempts"
            exit 1
          fi
          
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd android && ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
