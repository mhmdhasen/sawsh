name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Validate and Regenerate Gradle Wrapper if needed
        run: |
          echo "Checking gradle-wrapper.jar..."
          # Check if file exists, is not empty, and has valid JAR structure
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ] || ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "⚠️ Gradle wrapper missing, corrupted, or invalid, regenerating using global system Gradle..."
            rm -rf gradle/wrapper/
            
            # CRITICAL FIX: Use the global system 'gradle' command instead of the local broken wrapper script
            gradle wrapper --gradle-version=8.5 --distribution-type=bin
          else
            echo "✓ Gradle wrapper exists and is valid"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Verify Gradle Wrapper
        run: |
          echo "Repository structure:"
          ls -la
          echo ""
          # Create directory if it doesn't exist just to prevent 'ls' from failing the step
          mkdir -p gradle/wrapper/
          echo "Gradle wrapper structure:"
          ls -la gradle/wrapper/
          echo ""
          echo "Gradle wrapper JAR file info:"
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            file gradle/wrapper/gradle-wrapper.jar
          else
            echo "No JAR file found!"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/*.apk
