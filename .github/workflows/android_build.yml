name: Build Android APK (Kotlin)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Ensure Gradle wrapper exists
        run: |
          # Ensure wrapper directory exists
          mkdir -p gradle/wrapper

          # If wrapper JAR missing, try to download from Maven Central (reliable source)
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — attempting to download from Maven Central..."
            if curl -L -f -S --max-time 30 \
              https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.5/gradle-wrapper-8.5.jar \
              -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null; then
              echo "Downloaded gradle-wrapper.jar from Maven Central"
            else
              echo "Download failed — attempting to generate wrapper with installed Gradle"
              # Attempt to generate the wrapper if a system Gradle is available
              if command -v gradle >/dev/null 2>&1; then
                gradle wrapper --gradle-version 8.5 || true
              else
                echo "No system Gradle available to generate wrapper"
              fi
            fi
          else
            echo "gradle-wrapper.jar already present"
          fi

      - name: Fix and Grant execute permission for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd android && ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
